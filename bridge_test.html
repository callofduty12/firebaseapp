<!DOCTYPE html>
<html>
<head>
    <title>Amazon Bridge Explorer</title>
</head>
<body>
    <h1>Bridge Discovery</h1>
    <div id="output"></div>
    <script>
        function log(msg) {
            document.getElementById('output').innerHTML += msg + '<br>';
            console.log(msg);
        }
        
        // Check all window properties for potential bridges
        for (var prop in window) {
            if (prop.toLowerCase().includes('amazon') || 
                prop.toLowerCase().includes('bridge') ||
                prop.toLowerCase().includes('native') ||
                prop.toLowerCase().includes('android') ||
                prop.toLowerCase().includes('webview')) {
                log('Found: ' + prop + ' = ' + typeof window[prop]);
                try {
                    if (typeof window[prop] === 'object') {
                        for (var method in window[prop]) {
                            log('  Method: ' + method);
                        }
                    }
                } catch(e) {}
            }
        }
        
        // Check for common Android interfaces
        if (window.AmazonBridge) log('AmazonBridge exists');
        if (window.nativeBridge) log('nativeBridge exists');
        if (window.Android) log('Android exists');
        if (window.JSBridge) log('JSBridge exists');
        
        // Check document for any special objects
        log('Document.domain: ' + document.domain);
    </script>
</body>
</html>
