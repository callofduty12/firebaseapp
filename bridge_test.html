<!DOCTYPE html>
<html>
<head>
    <title>Amazon Bridge</title>
    <script>
        // Try to set a cookie that Amazon might use
        document.cookie = "amazon_inject=1; domain=.amazon.in; path=/";
        
        // Store injection in localStorage (won't work cross-domain)
        localStorage.setItem('inject', 'true');
        
        // Attempt to navigate
        window.location.replace("https://www.amazon.in");
    </script>
</head>
<body>
    <h1>Loading Amazon...</h1>
    <a href="https://www.amazon.in">Click here if not redirected</a>
</body>
</html>
