<!DOCTYPE html>
<html>
<head>
    <title>AMB Bridge Explorer</title>
</head>
<body>
    <h1>AMB Bridge Discovery</h1>
    <div id="output" style="font-family: monospace; white-space: pre-wrap;"></div>
    
    <script>
        function log(msg) {
            const output = document.getElementById('output');
            output.innerHTML += msg + '<br>';
            console.log(msg);
        }
        
        // Check for amb_bridge
        if (window.amb_bridge) {
            log('✅ Found window.amb_bridge');
            log('Type: ' + typeof window.amb_bridge);
            
            // List all methods/properties
            log('\n--- Methods and Properties ---');
            for (let prop in window.amb_bridge) {
                try {
                    const value = window.amb_bridge[prop];
                    log(`${prop}: ${typeof value}`);
                    
                    // If it's a function, try calling it (carefully)
                    if (typeof value === 'function') {
                        log(`  → Function: ${prop}`);
                        // Try to get function signature
                        log(`  → ${prop}.toString(): ${value.toString().substring(0, 100)}`);
                    }
                } catch(e) {
                    log(`  Error accessing ${prop}: ${e.message}`);
                }
            }
            
            // Try to call generateSecureRandomToken
            if (window.amb_bridge.generateSecureRandomToken) {
                log('\n--- Testing generateSecureRandomToken ---');
                try {
                    const token = window.amb_bridge.generateSecureRandomToken();
                    log(`Token generated: ${token}`);
                } catch(e) {
                    log(`Error: ${e.message}`);
                }
            }
            
            // Try other common method names
            const commonMethods = [
                'getAuthToken', 'setAuthToken', 'getSessionId', 
                'getDeviceInfo', 'getUserInfo', 'getAppVersion',
                'getMetrics', 'sendEvent', 'logEvent', 'track',
                'getWeblab', 'isWeblabEnabled', 'getTreatment'
            ];
            
            log('\n--- Checking for common methods ---');
            for (const method of commonMethods) {
                if (window.amb_bridge[method]) {
                    log(`✅ Found: ${method}`);
                }
            }
            
        } else {
            log('❌ window.amb_bridge not found');
            log('Checking for other bridge names...');
            
            // Check for other common bridge names
            const bridgeNames = ['amb_bridge', 'Ambridge', 'bridge', 'AndroidBridge', 'NativeBridge', 'AmazonBridge'];
            for (const name of bridgeNames) {
                if (window[name]) {
                    log(`✅ Found window.${name}`);
                }
            }
        }
        
        // Also check for the AMBWebBridge class directly
        if (window.AMBWebBridge) {
            log('\n✅ Found window.AMBWebBridge');
        }
    </script>
</body>
</html>
